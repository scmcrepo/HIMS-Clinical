<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Collection Report</title>
    <style>
        body { font-family: 'DejaVu Sans', sans-serif; font-size: 12px; margin: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #059669; padding-bottom: 10px; }
        .header h1 { margin: 0; color: #059669; font-size: 20px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th { background-color: #f0fdf4; border: 1px solid #d1fae5; padding: 8px; text-align: left; }
        .table td { border: 1px solid #d1fae5; padding: 8px; }
        .text-right { text-align: right; }
        .total-row { font-weight: bold; background-color: #f0fdf4; }
        .footer { margin-top: 30px; text-align: center; font-size: 10px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>DAILY COLLECTION REPORT</h1>
        <p>Hospital Management System</p>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Bill No</th>
                <th>Patient Name</th>
                <th>Patient No</th>
                <th>Mode</th>
                <th>Type</th>
                <th class="text-right">Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${data}">
                <td th:text="${row.payment_date}">12/05/2026</td>
                <td th:text="${row.bill_number}">B-1001</td>
                <td th:text="${row.patient_name}">John Doe</td>
                <td th:text="${row.patient_number}">P-1001</td>
                <td th:text="${row.payment_mode}">CASH</td>
                <td th:text="${row.payment_type}">COLLECTION</td>
                <td class="text-right" th:text="${#numbers.formatDecimal(row.amount, 1, 2)}">500.00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="6" class="text-right">Total Collection:</td>
                <td class="text-right" th:text="${#numbers.formatDecimal(#aggregates.sum(data.![amount]), 1, 2)}">0.00</td>
            </tr>
        </tfoot>
    </table>

    <div class="footer">
        Generated by HMS on <span th:text="${#dates.format(generatedAt, 'dd/MM/yyyy HH:mm')}"></span>
    </div>
</body>
</html>
