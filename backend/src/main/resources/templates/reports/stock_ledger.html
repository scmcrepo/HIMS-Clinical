<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stock Ledger</title>
    <style>
        body { font-family: 'DejaVu Sans', sans-serif; font-size: 12px; margin: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #ea580c; padding-bottom: 10px; }
        .header h1 { margin: 0; color: #ea580c; font-size: 20px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th { background-color: #fff7ed; border: 1px solid #ffedd5; padding: 8px; text-align: left; }
        .table td { border: 1px solid #ffedd5; padding: 8px; }
        .text-right { text-align: right; }
        .footer { margin-top: 30px; text-align: center; font-size: 10px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>STOCK LEDGER</h1>
        <p>Hospital Management System</p>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Batch No</th>
                <th>Expiry</th>
                <th class="text-right">Qty</th>
                <th class="text-right">Rate</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${data}">
                <td th:text="${row.item_name}">Paracetamol</td>
                <td th:text="${row.batch_number}">BN123</td>
                <td th:text="${row.expiry_date}">31/12/2026</td>
                <td class="text-right" th:text="${row.current_quantity}">100</td>
                <td class="text-right" th:text="${#numbers.formatDecimal(row.selling_rate, 1, 2)}">10.00</td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        Generated by HMS on <span th:text="${#dates.format(generatedAt, 'dd/MM/yyyy HH:mm')}"></span>
    </div>
</body>
</html>
