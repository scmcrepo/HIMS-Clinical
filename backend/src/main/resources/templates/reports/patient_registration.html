<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Registration Report</title>
    <style>
        body { font-family: 'DejaVu Sans', sans-serif; font-size: 12px; margin: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #7c3aed; padding-bottom: 10px; }
        .header h1 { margin: 0; color: #7c3aed; font-size: 20px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th { background-color: #f5f3ff; border: 1px solid #ddd6fe; padding: 8px; text-align: left; }
        .table td { border: 1px solid #ddd6fe; padding: 8px; }
        .footer { margin-top: 30px; text-align: center; font-size: 10px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>PATIENT REGISTRATION REPORT</h1>
        <p>Hospital Management System</p>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Reg Date</th>
                <th>Patient No</th>
                <th>Patient Name</th>
                <th>Gender</th>
                <th>Birth Date</th>
                <th>Contact</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${data}">
                <td th:text="${row.reg_date}">12/05/2026</td>
                <td th:text="${row.patient_number}">P-1001</td>
                <td th:text="${row.name}">John Doe</td>
                <td th:text="${row.gender == 0 ? 'Male' : 'Female'}">Male</td>
                <td th:text="${row.estimated_date_of_birth}">01/01/1990</td>
                <td th:text="${row.contact_number}">1234567890</td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        Generated by HMS on <span th:text="${#dates.format(generatedAt, 'dd/MM/yyyy HH:mm')}"></span>
    </div>
</body>
</html>
