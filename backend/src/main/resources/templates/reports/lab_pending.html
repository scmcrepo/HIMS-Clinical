<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pending Lab Orders</title>
    <style>
        body { font-family: 'DejaVu Sans', sans-serif; font-size: 12px; margin: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #dc2626; padding-bottom: 10px; }
        .header h1 { margin: 0; color: #dc2626; font-size: 20px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th { background-color: #fef2f2; border: 1px solid #fee2e2; padding: 8px; text-align: left; }
        .table td { border: 1px solid #fee2e2; padding: 8px; }
        .footer { margin-top: 30px; text-align: center; font-size: 10px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>PENDING LAB ORDERS</h1>
        <p>Hospital Management System</p>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Order No</th>
                <th>Order Date</th>
                <th>Patient Name</th>
                <th>Patient No</th>
                <th>Test Name</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${data}">
                <td th:text="${row.order_number}">ORD-101</td>
                <td th:text="${#dates.format(row.created_at, 'dd/MM/yyyy HH:mm')}">12/05/2026</td>
                <td th:text="${row.patient_name}">John Doe</td>
                <td th:text="${row.patient_number}">P-1001</td>
                <td th:text="${row.item_name}">CBC</td>
                <td th:text="${row.order_status}">PENDING</td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        Generated by HMS on <span th:text="${#dates.format(generatedAt, 'dd/MM/yyyy HH:mm')}"></span>
    </div>
</body>
</html>
