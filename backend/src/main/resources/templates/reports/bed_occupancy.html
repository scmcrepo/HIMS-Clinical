<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bed Occupancy Report</title>
    <style>
        body { font-family: 'DejaVu Sans', sans-serif; font-size: 12px; margin: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #0891b2; padding-bottom: 10px; }
        .header h1 { margin: 0; color: #0891b2; font-size: 20px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th { background-color: #ecfeff; border: 1px solid #cffafe; padding: 8px; text-align: left; }
        .table td { border: 1px solid #cffafe; padding: 8px; }
        .status-badge { padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .status-0 { background-color: #fee2e2; color: #991b1b; } /* Occupied */
        .status-1 { background-color: #dcfce7; color: #166534; } /* Available */
        .footer { margin-top: 30px; text-align: center; font-size: 10px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>BED OCCUPANCY REPORT</h1>
        <p>Hospital Management System</p>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Ward</th>
                <th>Bed No</th>
                <th>Status</th>
                <th>Patient Name</th>
                <th>Patient No</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${data}">
                <td th:text="${row.ward_name}">General Ward</td>
                <td th:text="${row.bed_number}">G1</td>
                <td>
                    <span th:class="'status-badge status-' + ${row.status}" 
                          th:text="${row.status == 0 ? 'OCCUPIED' : 'AVAILABLE'}">AVAILABLE</span>
                </td>
                <td th:text="${row.patient_name ?: '-'}">-</td>
                <td th:text="${row.patient_number ?: '-'}">-</td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        Generated by HMS on <span th:text="${#dates.format(generatedAt, 'dd/MM/yyyy HH:mm')}"></span>
    </div>
</body>
</html>
